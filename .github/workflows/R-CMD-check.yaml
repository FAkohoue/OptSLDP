# ==============================================================================
# .github/workflows/R-CMD-check.yaml
# Stable R CMD check workflow for OptSLDP
# - removes manual package-library cache to avoid pak plan failures
# - keeps setup-r-dependencies for CRAN packages
# - keeps explicit Bioconductor installation on Linux
# ==============================================================================

name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: "check-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: "${{ matrix.config.os }} (R ${{ matrix.config.r }})"

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: "release" }
          - { os: ubuntu-latest,  r: "devel"   }
          - { os: macos-latest,   r: "release" }
          - { os: windows-latest, r: "release" }

    env:
      R_KEEP_PKG_SOURCE: "yes"
      _R_CHECK_CRAN_INCOMING_REMOTE_: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: "3.1.11"

      - name: Install R ${{ matrix.config.r }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true
          extra-repositories: "https://bioconductor.org/packages/release/bioc"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            zlib1g-dev

      - name: Install Bioconductor packages (Linux)
        if: runner.os == 'Linux'
        shell: Rscript {0}
        run: |
          if (!requireNamespace("BiocManager", quietly = TRUE)) {
            install.packages("BiocManager", repos = "https://cloud.r-project.org")
          }

          bioc_pkgs <- c(
            "SNPRelate",
            "gdsfmt",
            "VariantAnnotation",
            "SummarizedExperiment",
            "GenomeInfoDb",
            "Biostrings",
            "S4Vectors"
          )

          missing_pkgs <- bioc_pkgs[
            !vapply(bioc_pkgs, requireNamespace, logical(1L), quietly = TRUE)
          ]

          if (length(missing_pkgs) > 0L) {
            message("Installing Bioconductor packages: ",
                    paste(missing_pkgs, collapse = ", "))
            BiocManager::install(
              missing_pkgs,
              ask = FALSE,
              update = FALSE
            )
          } else {
            message("All Bioconductor packages already installed.")
          }

      - name: Install CRAN dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
          needs: check

      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args: 'c("--as-cran", "--no-manual")'
          error-on: '"error"'
          upload-snapshots: true

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: >-
            check-results-${{ matrix.config.os }}-r${{ matrix.config.r }}
          path: check
          retention-days: 7
