# ==============================================================================
# .github/workflows/R-CMD-check.yaml
#
# Runs R CMD check on OptSLDP across three operating systems and two
# R versions on every push and pull request.
#
# Matrix
# ------
#   OS      : ubuntu-latest, macos-latest, windows-latest
#   R       : release (current CRAN release), devel (next R release)
#   Note    : Bioconductor and system-library steps are only needed on
#             Linux; macOS and Windows runners have all headers pre-installed.
#
# What this workflow does
# -----------------------
#   1. Check out the repository.
#   2. Install Pandoc (required to build vignettes during R CMD check).
#   3. Install R (matching the matrix version).
#   4. Install system C/C++ libraries on Linux (libcurl, libssl, etc.).
#   5. Restore the R package cache keyed on OS + R version + DESCRIPTION.
#   6. Install Bioconductor Suggests on Linux (SNPRelate, gdsfmt,
#      VariantAnnotation, and friends) — not on CRAN, must be installed
#      via BiocManager before r-lib/actions runs.
#   7. Install all CRAN/DESCRIPTION dependencies via
#      r-lib/actions/setup-r-dependencies, including rcmdcheck.
#   8. Run R CMD check via r-lib/actions/check-r-package with
#      --as-cran --no-manual flags.
#
# Required repository settings
# ----------------------------
#   None beyond the default Actions permissions. The badge in README.md
#   links to this workflow by name ("R-CMD-check").
#
# Concurrency
# -----------
#   One check per branch at a time; a new push cancels the previous run
#   on the same ref to avoid queuing redundant checks.
# ==============================================================================

name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress check when a new push arrives on the same branch/PR
concurrency:
  group:              "check-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  R-CMD-check:

    # --------------------------------------------------------------------------
    # Build matrix: 3 OS × 2 R versions = 6 concurrent jobs
    # r-devel is tested only on ubuntu to keep macOS/Windows minute usage low.
    # --------------------------------------------------------------------------
    runs-on: ${{ matrix.config.os }}

    name: "${{ matrix.config.os }} (R ${{ matrix.config.r }})"

    strategy:
      fail-fast: false          # let all matrix jobs finish even if one fails
      matrix:
        config:
          - { os: ubuntu-latest,  r: "release" }
          - { os: ubuntu-latest,  r: "devel"   }
          - { os: macos-latest,   r: "release" }
          - { os: windows-latest, r: "release" }

    env:
      # Disable interactive BiocManager prompts
      BIOC_VERSION:      "3.19"
      R_KEEP_PKG_SOURCE: "yes"
      # Suppress the "checking installed package size" NOTE on CRAN
      _R_CHECK_CRAN_INCOMING_REMOTE_: "false"

    steps:

      # ------------------------------------------------------------------------
      # 1. Check out the repository
      # ------------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # 2. Install Pandoc
      #    R CMD check runs vignette building (knitr → rmarkdown → Pandoc).
      #    Without a pinned Pandoc version, vignette rendering can differ
      #    between local and CI environments.
      # ------------------------------------------------------------------------
      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: "3.1.11"

      # ------------------------------------------------------------------------
      # 3. Install R
      #    use-public-rspm: true → Posit Public Package Manager pre-built
      #    binaries for Linux, cutting install time from ~20 min to ~2 min.
      # ------------------------------------------------------------------------
      - name: Install R ${{ matrix.config.r }}
        uses: r-lib/actions/setup-r@v2
        with:
          r-version:          ${{ matrix.config.r }}
          use-public-rspm:    true
          extra-repositories: "https://bioconductor.org/packages/3.19/bioc"

      # ------------------------------------------------------------------------
      # 4. Install system C/C++ headers (Linux only)
      #    gdsfmt, SNPRelate, and data.table need libcurl, zlib, and libssl
      #    headers to compile from source on the Ubuntu runner.
      #    macOS and Windows runners have these available natively.
      # ------------------------------------------------------------------------
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev           \
            libxml2-dev          \
            libfontconfig1-dev   \
            libharfbuzz-dev      \
            libfribidi-dev       \
            libfreetype6-dev     \
            libpng-dev           \
            libtiff5-dev         \
            libjpeg-dev          \
            zlib1g-dev

      # ------------------------------------------------------------------------
      # 5. Cache R packages
      #    Keyed on OS + R version + DESCRIPTION hash so the cache is
      #    invalidated exactly when any dependency changes.
      # ------------------------------------------------------------------------
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: >-
            ${{ runner.os }}-r-${{ matrix.config.r }}-
            ${{ hashFiles('DESCRIPTION') }}-bioc-${{ env.BIOC_VERSION }}
          restore-keys: |
            ${{ runner.os }}-r-${{ matrix.config.r }}-${{ hashFiles('DESCRIPTION') }}-
            ${{ runner.os }}-r-${{ matrix.config.r }}-

      # ------------------------------------------------------------------------
      # 6. Install Bioconductor Suggests (Linux only)
      #    r-lib/actions/setup-r-dependencies resolves CRAN packages but
      #    cannot install Bioconductor packages. These must be installed
      #    via BiocManager before the CRAN step so that rcmdcheck can find
      #    all Suggests when running R CMD check --as-cran.
      #
      #    macOS and Windows: Bioconductor packages are installed on those
      #    runners too via extra-repositories in setup-r, so rcmdcheck will
      #    find them; but because RSPM provides Windows/macOS binaries for
      #    most Bioc packages we only need the explicit BiocManager step
      #    on Linux where source compilation is required.
      # ------------------------------------------------------------------------
      - name: Install Bioconductor packages (Linux)
        if: runner.os == 'Linux'
        shell: Rscript {0}
        run: |
          if (!requireNamespace("BiocManager", quietly = TRUE))
            install.packages("BiocManager")

          BiocManager::install(
            version = Sys.getenv("BIOC_VERSION"),
            ask     = FALSE,
            update  = FALSE
          )

          bioc_pkgs <- c(
            "SNPRelate",
            "gdsfmt",
            "VariantAnnotation",
            "SummarizedExperiment",
            "GenomeInfoDb",
            "Biostrings",
            "S4Vectors"
          )

          missing_pkgs <- bioc_pkgs[
            !vapply(bioc_pkgs, requireNamespace,
                    logical(1L), quietly = TRUE)
          ]

          if (length(missing_pkgs) > 0L) {
            message("Installing Bioconductor packages: ",
                    paste(missing_pkgs, collapse = ", "))
            BiocManager::install(
              missing_pkgs,
              ask    = FALSE,
              update = FALSE
            )
          } else {
            message("All Bioconductor packages already installed.")
          }

      # ------------------------------------------------------------------------
      # 7. Install CRAN dependencies
      #    extra-packages installs rcmdcheck and any::pak for fast dependency
      #    resolution. needs: check tells setup-r-dependencies to install
      #    all hard and soft dependencies (Imports + Suggests) so that
      #    --as-cran does not produce NOTE: package suggested but not available.
      # ------------------------------------------------------------------------
      - name: Install CRAN dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
          needs: check

      # ------------------------------------------------------------------------
      # 8. Run R CMD check
      #    --as-cran        : applies CRAN-level checks (title case, URLs,
      #                       examples, vignette building, etc.)
      #    --no-manual      : skip PDF manual generation (requires LaTeX)
      #    error-on: warning: fail the job on any NOTE or WARNING, not just
      #                       ERROR, to catch issues before CRAN submission.
      # ------------------------------------------------------------------------
      - name: Run R CMD check
        uses: r-lib/actions/check-r-package@v2
        with:
          args:     'c("--as-cran", "--no-manual")'
          error-on: '"warning"'
          upload-snapshots: true

      # ------------------------------------------------------------------------
      # 9. Upload check results on failure
      #    Attaches the full R CMD check output directory as a workflow
      #    artefact so failures can be diagnosed without re-running locally.
      # ------------------------------------------------------------------------
      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: >-
            check-results-${{ matrix.config.os }}-r${{ matrix.config.r }}
          path: check
          retention-days: 7
