name: R-CMD-check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: "check-${{ github.ref }}"
  cancel-in-progress: true

env:
  R_KEEP_PKG_SOURCE: "yes"
  _R_CHECK_CRAN_INCOMING_REMOTE_: "false"
  _R_CHECK_FORCE_SUGGESTS_: "false"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    name: "${{ matrix.config.os }} (R ${{ matrix.config.r }})"

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: ubuntu-latest,  r: "release" }
          - { os: ubuntu-latest,  r: "devel"   }
          - { os: macos-latest,   r: "release" }
          - { os: windows-latest, r: "release" }

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Pandoc
        uses: r-lib/actions/setup-pandoc@v3
        with:
          pandoc-version: "3.1.11"

      - name: Install R ${{ matrix.config.r }}
        uses: r-lib/actions/setup-r@v3
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            zlib1g-dev \
            libopenblas-dev \
            liblapack-dev

      - name: Install Bioconductor packages (Linux)
        if: runner.os == 'Linux'
        shell: Rscript {0}
        run: |
          if (!requireNamespace("BiocManager", quietly = TRUE))
            install.packages("BiocManager", repos = "https://cloud.r-project.org")
          bioc_pkgs <- c("SNPRelate", "gdsfmt", "VariantAnnotation",
                         "SummarizedExperiment", "GenomeInfoDb",
                         "Biostrings", "S4Vectors")
          missing_pkgs <- bioc_pkgs[
            !vapply(bioc_pkgs, requireNamespace, logical(1L), quietly = TRUE)
          ]
          if (length(missing_pkgs) > 0L)
            BiocManager::install(missing_pkgs, ask = FALSE, update = FALSE)

      - name: Install CRAN dependencies (Linux)
        if: runner.os == 'Linux'
        shell: Rscript {0}
        run: |
          pkgs <- c("rcmdcheck", "data.table", "knitr", "rmarkdown",
                    "testthat", "Rcpp", "RcppArmadillo", "RSpectra")
          missing <- pkgs[!vapply(pkgs, requireNamespace, logical(1L), quietly = TRUE)]
          if (length(missing))
            install.packages(missing, repos = "https://cloud.r-project.org")
          install.packages(".", repos = NULL, type = "source",
                           INSTALL_opts = "--no-docs --no-multiarch --no-build-vignettes")

      - name: Install CRAN dependencies (macOS/Windows)
        if: runner.os != 'Linux'
        uses: r-lib/actions/setup-r-dependencies@v3
        with:
          extra-packages: |
            any::rcmdcheck
            any::RSpectra
          needs: check

      - name: Run R CMD check (Linux)
        if: runner.os == 'Linux'
        shell: Rscript {0}
        run: |
          result <- rcmdcheck::rcmdcheck(
            args      = c("--as-cran", "--no-manual"),
            error_on  = "error",
            check_dir = "check"
          )
          print(result)

      - name: Run R CMD check (macOS/Windows)
        if: runner.os != 'Linux'
        uses: r-lib/actions/check-r-package@v3
        with:
          args: 'c("--as-cran", "--no-manual")'
          error-on: '"error"'
          upload-snapshots: true

      - name: Upload check results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results-${{ matrix.config.os }}-r${{ matrix.config.r }}
          path: check
          retention-days: 7
